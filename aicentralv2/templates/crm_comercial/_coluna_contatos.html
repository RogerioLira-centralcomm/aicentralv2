<div class="crm-col" id="col-contatos">
    <div class="crm-col-header">
        <div class="crm-contact-head">
            <h2 class="font-semibold text-xs">Contatos</h2>
            <button type="button" class="crm-btn-header-action crm-btn-header-primary" id="btn-contato-novo" title="Adicionar contato">+ Contato</button>
        </div>
        <div class="crm-search-row">
            <input type="search" id="crm-contato-busca" class="crm-search" placeholder="Buscar contato...">
            <button type="button" id="btn-contato-import" class="crm-filter-btn" title="Importar contatos">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 4h18l-7 8v6l-4 2v-8L3 4z"/></svg>
            </button>
        </div>
    </div>
    <div class="crm-col-body scroll-suave" id="lista-contatos">
        <div class="crm-empty-state">Selecione um cliente.</div>
    </div>
</div>
