<div class="swr-col" id="col-clientes">
    <div class="swr-col-header">
        <div class="flex items-center justify-between gap-1">
            <h2 class="font-semibold text-sm flex flex-wrap items-center gap-x-2 gap-y-0.5">
                <span>Clientes</span>
                <span id="swr-contador-total" class="hidden text-[11px] font-normal opacity-60 tabular-nums" aria-live="polite">0</span>
                <span id="swr-contador-carteira" class="hidden inline-flex items-center gap-1.5 text-[11px] font-normal opacity-70 tabular-nums" aria-live="polite">
                    <span id="swr-chip-ag" class="inline-flex items-center gap-0.5 rounded px-1 py-0 bg-base-200" title="Agências na carteira (filtro atual)"><span id="swr-letra-a" class="font-semibold opacity-90">A</span><span id="swr-n-agencias">0</span></span>
                    <span id="swr-chip-cli" class="inline-flex items-center gap-0.5 rounded px-1 py-0 bg-base-200" title="Clientes diretos na carteira (filtro atual)"><span id="swr-letra-c" class="font-semibold opacity-90">C</span><span id="swr-n-clientes">0</span></span>
                </span>
            </h2>
            <button type="button" id="swr-clientes-filtro" class="btn btn-ghost btn-xs btn-square h-6 w-6 min-h-0 p-0" title="Filtros avançados">
                <svg class="w-3.5 h-3.5 opacity-70" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2a1 1 0 01-.293.707L15 12.414V19a1 1 0 01-.553.894l-4 2A1 1 0 019 21v-8.586L3.293 6.707A1 1 0 013 6V4z"/></svg>
            </button>
        </div>
        <input type="text" id="busca-cliente" class="input input-bordered input-xs w-full mt-1"
               placeholder="Buscar cliente..." />
    </div>
    <div class="swr-col-body" id="lista-clientes">
        <div class="swr-empty-state">Selecione um executivo para carregar a carteira.</div>
    </div>
    <div class="swr-col-footer hidden" id="swr-clientes-paginacao">
        <button type="button" id="swr-cli-prev" class="btn btn-ghost btn-xs btn-square h-6 w-6 min-h-0 p-0" title="Anterior" aria-label="Anterior">‹</button>
        <span id="swr-cli-info" class="text-[11px] opacity-70 tabular-nums">Exibindo 0 de 0 clientes</span>
        <button type="button" id="swr-cli-next" class="btn btn-ghost btn-xs btn-square h-6 w-6 min-h-0 p-0" title="Próximo" aria-label="Próximo">›</button>
    </div>
</div>
