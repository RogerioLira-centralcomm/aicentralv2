<div class="swr-col" id="col-objetivos">
    <div class="swr-col-header">
        <div class="flex items-center justify-between gap-1 flex-wrap">
            <h2 class="font-semibold text-sm leading-tight">Objetivos e Comunicação</h2>
            <details class="dropdown dropdown-end shrink-0">
                <summary class="btn btn-ghost btn-outline h-6 min-h-0 px-1.5 py-0 text-[10px] leading-none font-medium list-none cursor-pointer border border-base-300">Mais</summary>
                <ul class="dropdown-content z-[1] menu p-2 shadow bg-base-100 rounded-box w-52 text-xs border border-base-300">
                    <li><button type="button" id="btn-sugerir-ia-header" class="justify-start">Sugerir com IA</button></li>
                </ul>
            </details>
        </div>
    </div>
    <div class="swr-col-body swr-col-body--split">
        <div class="swr-obj-scroll" id="lista-objetivos">
            <div class="swr-empty-state">Selecione um cliente.</div>
        </div>

        <div class="swr-comunicacao" id="swr-comunicacao">
            <div class="flex items-center justify-between gap-1 mb-1.5 flex-wrap">
                <h3 class="font-semibold text-sm">Comunicação</h3>
                <div class="tabs tabs-boxed tabs-xs" id="swrc-tabs">
                    <a class="tab" data-ctab="historico">Histórico</a>
                    <a class="tab tab-active" data-ctab="gerar">Gerar mensagem</a>
                    <a class="tab" data-ctab="modelos">Modelos</a>
                </div>
            </div>

            <div id="swrc-panel-gerar" class="space-y-2">
                <div>
                    <label class="swr-c-label">Contato</label>
                    <select id="swrc-contato" class="select select-bordered select-xs w-full">
                        <option value="">Selecione um contato</option>
                    </select>
                </div>
                <div>
                    <label class="swr-c-label">Canal</label>
                    <div class="flex gap-3">
                        <label class="cursor-pointer gap-1 flex items-center text-xs"><input type="radio" name="swrc-canal" value="whatsapp" class="radio radio-xs radio-success" checked /> WhatsApp</label>
                        <label class="cursor-pointer gap-1 flex items-center text-xs"><input type="radio" name="swrc-canal" value="email" class="radio radio-xs radio-info" /> E-mail</label>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="swr-c-label">Objetivo da mensagem</label>
                        <select id="swrc-objetivo" class="select select-bordered select-xs w-full">
                            <option value="">Selecione</option>
                            <option value="Retomar contato">Retomar contato</option>
                            <option value="Apresentar novo produto">Apresentar novo produto</option>
                            <option value="Follow-up de proposta">Follow-up de proposta</option>
                            <option value="Agendar reunião">Agendar reunião</option>
                            <option value="Enviar case de performance">Enviar case de performance</option>
                        </select>
                    </div>
                    <div>
                        <label class="swr-c-label">Tom</label>
                        <select id="swrc-tom" class="select select-bordered select-xs w-full">
                            <option value="Consultivo">Consultivo</option>
                            <option value="Direto">Direto</option>
                            <option value="Formal">Formal</option>
                            <option value="Amigável">Amigável</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label class="swr-c-label">Contexto (opcional)</label>
                    <textarea id="swrc-contexto" class="textarea textarea-bordered textarea-xs w-full" rows="2" placeholder="Ex.: reforçar conversa da semana passada..."></textarea>
                </div>
                <button type="button" id="swrc-gerar" class="btn btn-xs btn-primary w-full">Gerar mensagem com IA</button>

                <div id="swrc-preview" class="hidden">
                    <div class="text-[11px] font-semibold opacity-60 mt-1 mb-1">Mensagens geradas</div>
                    <div class="swr-c-msg bg-base-200 rounded p-2 whitespace-pre-wrap text-xs" id="swrc-texto"></div>
                    <div class="flex gap-1 mt-1 flex-wrap">
                        <button type="button" class="btn btn-xs btn-outline" id="swrc-copiar">Copiar</button>
                        <button type="button" class="btn btn-xs btn-success" id="swrc-whatsapp">WhatsApp</button>
                        <button type="button" class="btn btn-xs btn-info" id="swrc-email">E-mail</button>
                        <button type="button" class="btn btn-xs btn-ghost" id="swrc-regenerar">Regenerar</button>
                    </div>
                </div>
            </div>

            <div id="swrc-panel-historico" class="hidden text-xs opacity-70 py-2">
                Selecione um contato e use a aba "Gerar mensagem" para criar comunicações.
            </div>
            <div id="swrc-panel-modelos" class="hidden text-xs opacity-70 py-2">
                Modelos de mensagem em breve.
            </div>
        </div>
    </div>
</div>
