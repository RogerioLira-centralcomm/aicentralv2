<dialog id="swr-modal-cliente" class="modal">
  <div class="modal-box w-11/12 max-w-4xl bg-white p-0 rounded-lg max-h-[90vh] flex flex-col overflow-hidden">
    <div class="flex items-center justify-between px-4 py-2 border-b border-gray-200 bg-gray-50">
      <h3 class="font-semibold text-sm text-gray-800" id="swr-cliente-modal-title">Novo Cliente</h3>
      <button type="button" id="swr-cliente-close" class="p-1.5 hover:bg-gray-200 rounded transition-colors" aria-label="Fechar">×</button>
    </div>

    <form id="swr-form-cliente" method="post" class="p-4 overflow-y-auto scroll-suave flex-1 min-h-0 space-y-3">
      <input type="hidden" id="swr-cliente-id" name="cliente_id" value="">
      <div class="grid grid-cols-2 md:grid-cols-12 gap-2 items-end">
        <div id="swr-status-fields" class="form-control col-span-1 md:col-span-1 hidden">
          <label class="text-[10px] font-medium text-gray-600 mb-0.5">Status</label>
          <div class="flex gap-0">
            <label class="swr-status-toggle cursor-pointer flex items-center justify-center px-2 py-1 border-2 rounded-l-lg text-[10px] font-semibold border-green-500 bg-green-50 text-green-700" data-status="1">
              <input type="radio" name="status" value="1" class="hidden" checked>
              <span>Ativo</span>
            </label>
            <label class="swr-status-toggle cursor-pointer flex items-center justify-center px-2 py-1 border-2 rounded-r-lg text-[10px] font-semibold border-gray-300 bg-white text-gray-500" data-status="0">
              <input type="radio" name="status" value="0" class="hidden">
              <span>Inativo</span>
            </label>
          </div>
        </div>
        <div class="form-control col-span-1 md:col-span-2">
          <label class="text-[10px] font-medium text-gray-600 mb-0.5">Pessoa*</label>
          <div class="flex gap-0">
            <label class="swr-pessoa-toggle cursor-pointer flex items-center justify-center gap-1 px-2 py-1 border-2 rounded-l-lg text-[10px] font-semibold border-green-500 bg-green-50 text-green-700" data-pessoa="J">
              <input type="radio" name="pessoa" value="J" class="hidden" required checked>
              <span>PJ</span>
            </label>
            <label class="swr-pessoa-toggle cursor-pointer flex items-center justify-center gap-1 px-2 py-1 border-2 rounded-r-lg text-[10px] font-semibold border-gray-300 bg-white text-gray-500 hover:bg-gray-50" data-pessoa="F">
              <input type="radio" name="pessoa" value="F" class="hidden" required>
              <span>PF</span>
            </label>
          </div>
        </div>
        <div class="form-control col-span-1 md:col-span-2">
          <label id="swr-label-cnpj" class="text-[10px] font-medium text-gray-600 mb-0.5">CNPJ</label>
          <input id="swr-input-cnpj" name="cnpj" class="w-full px-2 py-1 text-[10px] border border-gray-300 rounded focus:outline-none focus:border-gray-400" placeholder="CNPJ" maxlength="18">
        </div>
        <div class="form-control col-span-2 md:col-span-4">
          <label id="swr-label-nome" class="text-[10px] font-medium text-gray-600 mb-0.5">Nome Fantasia*</label>
          <input id="swr-input-nome" name="nome_fantasia" required class="w-full px-2 py-1 text-[10px] border border-gray-300 rounded focus:outline-none focus:border-gray-400" placeholder="Nome fantasia">
        </div>
        <div id="swr-razao-fields" class="form-control col-span-2 md:col-span-4">
          <label class="text-[10px] font-medium text-gray-600 mb-0.5">Razão Social*</label>
          <input id="swr-input-razao" name="razao_social" required class="w-full px-2 py-1 text-[10px] border border-gray-300 rounded focus:outline-none focus:border-gray-400" placeholder="Razão social">
        </div>
      </div>

      <div class="grid grid-cols-2 md:grid-cols-12 gap-2">
        <div id="swr-tipo-cliente-fields" class="form-control col-span-1 md:col-span-2">
          <label class="text-[10px] font-medium text-gray-600 mb-0.5">Tipo*</label>
          <select id="swr-select-tipo-cliente" name="id_tipo_cliente" class="w-full px-2 py-1 text-[10px] border border-gray-300 rounded focus:outline-none focus:border-gray-400 bg-white" required>
            <option value="">Selecione</option>
            {% for tipo in tipos_cliente %}
              <option value="{{ tipo.id_tipo_cliente }}" data-parceiro="{% if 'parceiro' in (tipo.display or '')|lower %}1{% else %}0{% endif %}">{{ tipo.display }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="form-control col-span-1 md:col-span-3">
          <label class="text-[10px] font-medium text-gray-600 mb-0.5">Classificação</label>
          <select id="swr-classificacao-cliente" name="classificacao_cliente" class="w-full px-2 py-1 text-[10px] border border-gray-300 rounded focus:outline-none focus:border-gray-400 bg-white">
            <option value="Prospecção" selected>Prospecção</option>
            <option value="Ativo">Ativo</option>
            <option value="Geladeira">Geladeira</option>
          </select>
        </div>
        <div class="form-control col-span-2 md:col-span-4">
          <label class="text-[10px] font-medium text-gray-600 mb-0.5">Executivo de Vendas*</label>
          <select id="swr-cliente-vendedor" name="vendas_central_comm" class="w-full px-2 py-1 text-[10px] border border-gray-300 rounded focus:outline-none focus:border-gray-400 bg-white" required>
            <option value="">Selecione</option>
            {% for vendedor in vendedores_cc %}
              <option value="{{ vendedor.id_contato_cliente }}">{{ vendedor.nome_completo }}</option>
            {% endfor %}
          </select>
        </div>
        <div id="swr-agencia-fields" class="form-control col-span-1 md:col-span-2">
          <label class="text-[10px] font-medium text-gray-600 mb-0.5">Agência*</label>
          <select id="swr-cliente-agencia" name="pk_id_tbl_agencia" class="w-full px-2 py-1 text-[10px] border border-gray-300 rounded focus:outline-none focus:border-gray-400 bg-white" required>
            <option value="">Selecione</option>
            {% for agencia in agencias %}
              <option value="{{ agencia.id_agencia }}" data-agencia-sim="{% if agencia.key %}1{% else %}0{% endif %}">{{ agencia.display }}</option>
            {% endfor %}
          </select>
        </div>
        <div id="swr-percentual-fields" class="form-control col-span-1 md:col-span-1">
          <label class="text-[10px] font-medium text-gray-600 mb-0.5">BV (%)</label>
          <input id="swr-cliente-percentual" name="percentual" type="text" maxlength="5" class="w-full px-2 py-1 text-[10px] border border-gray-300 rounded focus:outline-none focus:border-gray-400" placeholder="00,00">
        </div>
      </div>

      <div class="border-t border-gray-200 pt-2 mt-2">
        <h4 class="text-[9px] font-medium text-gray-500 uppercase mb-2">Campos Comerciais</h4>
        <div class="grid grid-cols-2 md:grid-cols-12 gap-2">
          <div class="form-control col-span-1 md:col-span-3">
            <label class="text-[10px] font-medium text-gray-600 mb-0.5">Opera mídia?</label>
            <select name="opera_midia" class="w-full px-2 py-1 text-[10px] border border-gray-300 rounded focus:outline-none focus:border-gray-400 bg-white">
              <option value="0" selected>Não</option>
              <option value="1">Sim</option>
            </select>
          </div>
          <div class="form-control col-span-1 md:col-span-3">
            <label class="text-[10px] font-medium text-gray-600 mb-0.5">Tem demanda por dados?</label>
            <select name="demanda_dados" class="w-full px-2 py-1 text-[10px] border border-gray-300 rounded focus:outline-none focus:border-gray-400 bg-white">
              <option value="0" selected>Não</option>
              <option value="1">Sim</option>
            </select>
          </div>
          <div class="form-control col-span-2 md:col-span-6">
            <label class="text-[10px] font-medium text-gray-600 mb-0.5">Tem demanda por programática e outros canais?</label>
            <select name="demanda_programatica_canais" class="w-full px-2 py-1 text-[10px] border border-gray-300 rounded focus:outline-none focus:border-gray-400 bg-white">
              <option value="0" selected>Não</option>
              <option value="1">Sim</option>
            </select>
          </div>
          <div class="form-control col-span-2 md:col-span-12">
            <label class="text-[10px] font-medium text-gray-600 mb-0.5">Observações comerciais adicionais</label>
            <textarea name="observacoes_comerciais_adicionais" rows="2" class="w-full px-2 py-1 text-[10px] border border-gray-300 rounded focus:outline-none focus:border-gray-400 resize-none" placeholder="Observações comerciais relevantes..."></textarea>
          </div>
        </div>
      </div>

      <div class="grid grid-cols-2 md:grid-cols-12 gap-2">
        <div class="form-control col-span-1 md:col-span-2">
          <label class="text-[10px] font-medium text-gray-600 mb-0.5">Margem CC (%)</label>
          <input name="margem_cc" type="text" inputmode="numeric" class="w-full px-2 py-1 text-[10px] border border-gray-300 rounded focus:outline-none focus:border-gray-400" placeholder="Opcional">
        </div>
        <div id="swr-inscricoes-fields" class="contents">
          <div class="form-control col-span-1 md:col-span-2">
            <label class="text-[10px] font-medium text-gray-600 mb-0.5">Insc. Estadual</label>
            <input name="inscricao_estadual" class="w-full px-2 py-1 text-[10px] border border-gray-300 rounded focus:outline-none focus:border-gray-400" placeholder="IE">
          </div>
          <div class="form-control col-span-1 md:col-span-2">
            <label class="text-[10px] font-medium text-gray-600 mb-0.5">Insc. Municipal</label>
            <input name="inscricao_municipal" class="w-full px-2 py-1 text-[10px] border border-gray-300 rounded focus:outline-none focus:border-gray-400" placeholder="IM">
          </div>
        </div>
      </div>

      <div class="border-t border-gray-200 pt-2 mt-2">
        <h4 class="text-[9px] font-medium text-gray-500 uppercase mb-2">Endereço</h4>
        <div class="grid grid-cols-3 md:grid-cols-7 gap-2">
          <div class="form-control">
            <label class="text-[10px] font-medium text-gray-600 mb-0.5">CEP</label>
            <input id="swr-cliente-cep" name="cep" class="w-full px-2 py-1 text-[10px] border border-gray-300 rounded focus:outline-none focus:border-gray-400" placeholder="00000-000">
          </div>
          <div class="form-control">
            <label class="text-[10px] font-medium text-gray-600 mb-0.5">UF</label>
            <select id="swr-cliente-estado" name="pk_id_aux_estado" class="w-full px-2 py-1 text-[10px] border border-gray-300 rounded focus:outline-none focus:border-gray-400 bg-white">
              <option value="">UF</option>
              {% for estado in estados %}
                <option value="{{ estado.id_estado }}" data-sigla="{{ estado.sigla }}">{{ estado.sigla }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="form-control">
            <label class="text-[10px] font-medium text-gray-600 mb-0.5">Cidade</label>
            <input id="swr-cliente-cidade" name="cidade" class="w-full px-2 py-1 text-[10px] border border-gray-300 rounded focus:outline-none focus:border-gray-400" placeholder="Cidade">
          </div>
          <div class="form-control">
            <label class="text-[10px] font-medium text-gray-600 mb-0.5">Bairro</label>
            <input id="swr-cliente-bairro" name="bairro" class="w-full px-2 py-1 text-[10px] border border-gray-300 rounded focus:outline-none focus:border-gray-400" placeholder="Bairro">
          </div>
          <div class="form-control col-span-3">
            <label class="text-[10px] font-medium text-gray-600 mb-0.5">Logradouro</label>
            <input id="swr-cliente-logradouro" name="logradouro" class="w-full px-2 py-1 text-[10px] border border-gray-300 rounded focus:outline-none focus:border-gray-400" placeholder="Logradouro">
          </div>
        </div>
        <div class="grid grid-cols-4 gap-2 mt-2">
          <div class="form-control">
            <label class="text-[10px] font-medium text-gray-600 mb-0.5">Nº</label>
            <input name="numero" class="w-full px-2 py-1 text-[10px] border border-gray-300 rounded focus:outline-none focus:border-gray-400" placeholder="Nº">
          </div>
          <div class="form-control col-span-3">
            <label class="text-[10px] font-medium text-gray-600 mb-0.5">Complemento</label>
            <input name="complemento" class="w-full px-2 py-1 text-[10px] border border-gray-300 rounded focus:outline-none focus:border-gray-400" placeholder="Complemento">
          </div>
        </div>
      </div>

      <div class="flex justify-end gap-2 pt-3 border-t border-gray-200 mt-3">
        <button type="button" id="swr-cliente-cancel" class="px-3 py-1.5 text-[10px] text-gray-600 hover:text-gray-800 transition-colors">Cancelar</button>
        <button type="submit" id="swr-cliente-submit" class="px-3 py-1.5 text-[10px] bg-gray-800 text-white rounded hover:bg-gray-700 transition-colors">
          Cadastrar
        </button>
      </div>
    </form>
  </div>
</dialog>
