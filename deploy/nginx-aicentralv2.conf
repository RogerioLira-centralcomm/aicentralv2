# Site nginx — AIcentral v2
# Copiado para /etc/nginx/sites-available/aicentralv2 pelo deploy.sh
#
# SSL: ajuste ssl_certificate* se usar Let's Encrypt (certbot).
# Domínio padrão: aicentral.centralcomm.media (override via NGINX_SERVER_NAME no deploy)

upstream aicentralv2_app {
    server 127.0.0.1:8001;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name aicentral.centralcomm.media;

    client_max_body_size 256M;

    location /static/ {
        alias /var/www/aicentralv2/aicentralv2/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        proxy_pass http://aicentralv2_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 300s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
    }
}

